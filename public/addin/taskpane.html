<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K-Pilot AI</title>

    <style>
      :root {
        --bg: #f5f7fb;
        --surface: #ffffff;
        --surface-2: #f8fafc;
        --border: #d9dee8;
        --border-soft: #e7ebf2;
        --text: #1f2a44;
        --muted: #667085;
        --primary: #173b8f;
        --primary-2: #234db8;
        --primary-soft: #eef3ff;
        --success-soft: #ecfdf3;
        --success-border: #abefc6;
        --success-text: #067647;
        --shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
      }

      body {
        padding: 8px;
      }

      button,
      select,
      textarea,
      input {
        font: inherit;
      }

      .app {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .shell {
        background: var(--surface);
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border-soft);
        background: #fff;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .brand-mark {
        width: 22px;
        height: 22px;
        border-radius: 6px;
        background: linear-gradient(135deg, #173b8f 0%, #4f79e8 100%);
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 800;
        flex-shrink: 0;
      }

      .brand-name {
        font-size: 13px;
        font-weight: 700;
        color: #1d2b4f;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .icon-btn {
        width: 24px;
        height: 24px;
        border: none;
        background: transparent;
        border-radius: 6px;
        color: #6b7280;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: default;
        padding: 0;
      }

      .icon-btn svg {
        width: 15px;
        height: 15px;
        stroke: currentColor;
      }

      .content {
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .tabs {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        background: #fff;
      }

      .tab-btn {
        appearance: none;
        border: none;
        background: #fff;
        color: #4b5563;
        font-size: 12px;
        font-weight: 600;
        padding: 10px 8px;
        cursor: pointer;
        border-right: 1px solid var(--border-soft);
      }

      .tab-btn:last-child {
        border-right: none;
      }

      .tab-btn.active {
        background: var(--primary-soft);
        color: var(--primary);
      }

      .panel {
        display: none;
        flex-direction: column;
        gap: 10px;
      }

      .panel.active {
        display: flex;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px;
      }

      .section-title {
        font-size: 12px;
        font-weight: 700;
        color: #344054;
        margin: 0 0 8px 0;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .select,
      .textarea,
      .input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        color: var(--text);
        padding: 10px 12px;
        outline: none;
      }

      .select {
        font-size: 12px;
        height: 40px;
      }

      .textarea {
        min-height: 150px;
        resize: vertical;
        font-size: 13px;
        line-height: 1.55;
      }

      .textarea.reply-large {
        min-height: 280px;
      }

      .textarea.summary-large {
        min-height: 230px;
      }

      .textarea.small {
        min-height: 118px;
      }

      .textarea:focus,
      .input:focus,
      .select:focus {
        border-color: #9db3ee;
        box-shadow: 0 0 0 3px rgba(35, 77, 184, 0.08);
      }

      .output-box {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
        overflow: hidden;
      }

      .output-toolbar {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        padding: 8px 10px 0 10px;
      }

      .toolbar-icon {
        appearance: none;
        border: none;
        background: transparent;
        color: #70798c;
        padding: 0;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .toolbar-icon svg {
        width: 15px;
        height: 15px;
        stroke: currentColor;
      }

      .toolbar-icon:hover {
        color: var(--primary);
      }

      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .btn {
        appearance: none;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        min-height: 38px;
        padding: 9px 10px;
        font-size: 12px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        cursor: pointer;
      }

      .btn svg {
        width: 14px;
        height: 14px;
        stroke: currentColor;
        flex-shrink: 0;
      }

      .btn:hover {
        background: #f8fafc;
      }

      .btn.primary {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }

      .btn.primary:hover {
        background: var(--primary-2);
        border-color: var(--primary-2);
      }

      .btn.full {
        width: 100%;
      }

      .status-line {
        display: none;
        font-size: 12px;
        font-weight: 600;
        padding: 2px 2px 0;
      }

      .status-line.show {
        display: block;
      }

      .status-line.loading {
        color: var(--primary);
      }

      .status-line.error {
        color: #b42318;
      }

      .footer-voice {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fff;
        padding: 10px 12px;
      }

      .voice-left,
      .voice-right {
        width: 36px;
        height: 36px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #f8fafc;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--primary);
        flex-shrink: 0;
        cursor: pointer;
      }

      .voice-left.listening {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
      }

      .voice-right.speaking {
        background: var(--primary-soft);
        border-color: #9db3ee;
        color: var(--primary);
      }

      .voice-left svg,
      .voice-right svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
      }

      .voice-text {
        flex: 1;
        text-align: center;
        color: var(--primary);
        font-weight: 700;
        font-size: 14px;
      }

      .task-cards {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .task-card {
        border: 1px solid var(--success-border);
        background: var(--success-soft);
        border-radius: 10px;
        padding: 10px;
        display: none;
        flex-direction: column;
        gap: 8px;
      }

      .task-card.show {
        display: flex;
      }

      .task-card-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
      }

      .task-card-title {
        font-size: 13px;
        font-weight: 700;
        color: #11412f;
        line-height: 1.4;
      }

      .task-card-meta {
        font-size: 11px;
        font-weight: 700;
        color: var(--success-text);
        white-space: nowrap;
      }

      .task-card-actions {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }

      .task-action-btn {
        appearance: none;
        border: 1px solid var(--success-border);
        border-radius: 8px;
        background: #fff;
        color: #175c3f;
        min-height: 34px;
        padding: 8px;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
      }

      .task-action-btn:hover {
        background: #fafffc;
      }

      .helper-text {
        font-size: 11px;
        color: var(--muted);
        margin-top: 4px;
      }
    </style>
  </head>

  <body>
    <div class="app">
      <div class="shell">
        <div class="topbar">
          <div class="brand">
            <div class="brand-mark">K</div>
            <div class="brand-name">K-Pilot AI</div>
          </div>

          <div class="topbar-actions">
            <button class="icon-btn" type="button" aria-label="Fest">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M8 4h8l-2 5 4 3v1H6v-1l4-3-2-5Z" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 13v7" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </button>
            <button class="icon-btn" type="button" aria-label="Lukk">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M6 6l12 12M18 6 6 18" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="content">
          <div class="tabs" id="tabs">
            <button class="tab-btn active" data-tab="reply">Svar</button>
            <button class="tab-btn" data-tab="summary">Oppsummer</button>
            <button class="tab-btn" data-tab="tasks">Oppgaver</button>
            <button class="tab-btn" data-tab="tools">Verktøy</button>
          </div>

          <div id="statusLine" class="status-line">
            <span id="statusText"></span>
          </div>

          <section class="panel active" data-panel="reply">
            <div class="card">
              <h3 class="section-title">Velg svar type / tone</h3>
              <div class="field">
                <select id="toneSelect" class="select">
                  <option value="standard">Profesjonell standard</option>
                  <option value="kort">Kort</option>
                  <option value="mer_formell">Mer formell</option>
                  <option value="mer_uformell">Mer uformell</option>
                  <option value="mer_salgsrettet">Mer salgsrettet</option>
                </select>
              </div>
            </div>

            <div class="grid-2">
              <button id="generateReplyBtn" class="btn primary" type="button">
                Generer svar
              </button>
              <button id="insertReplyBtn" class="btn" type="button">
                Sett inn i e-post
              </button>
            </div>

            <div class="card">
              <h3 class="section-title">Generert svar</h3>

              <div class="output-box">
                <div class="output-toolbar">
                  <button id="speakReplyBtnTop" class="toolbar-icon" type="button" aria-label="Les opp svar">
                    <svg viewBox="0 0 24 24" fill="none">
                      <path d="M5 9v6h4l5 4V5l-5 4H5Z" stroke-width="1.8" stroke-linejoin="round"/>
                      <path d="M18 9.5a4.5 4.5 0 0 1 0 5" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                  </button>
                  <button class="toolbar-icon" type="button" aria-label="Tommel opp">
                    <svg viewBox="0 0 24 24" fill="none">
                      <path d="M7 11v9M11 10l2-6c.3-1 1.7-1 1.9.1L15 8h4.4c1.1 0 1.9 1 1.7 2.1l-1.2 7A2 2 0 0 1 18 19h-7V10Z" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                      <path d="M4 11h3v9H4z" stroke-width="1.8" stroke-linejoin="round"/>
                    </svg>
                  </button>
                  <button class="toolbar-icon" type="button" aria-label="Tommel ned">
                    <svg viewBox="0 0 24 24" fill="none">
                      <path d="M7 4v9M11 14l2 6c.3 1 1.7 1 1.9-.1L15 16h4.4c1.1 0 1.9-1 1.7-2.1l-1.2-7A2 2 0 0 0 18 5h-7v9Z" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                      <path d="M4 4h3v9H4z" stroke-width="1.8" stroke-linejoin="round"/>
                    </svg>
                  </button>
                  <button class="toolbar-icon" type="button" aria-label="Lagre">
                    <svg viewBox="0 0 24 24" fill="none">
                      <path d="M5 5h11l3 3v11H5z" stroke-width="1.8" stroke-linejoin="round"/>
                      <path d="M8 5v5h8V5M8 19h8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </button>
                </div>

                <textarea
                  id="replyOutput"
                  class="textarea reply-large"
                  placeholder="Generert svar vises her..."
                ></textarea>
              </div>
            </div>

            <div class="card">
              <h3 class="section-title">Endre svar</h3>

              <div class="grid-2">
                <button class="btn prompt-action" data-action="Kortere" type="button">Kortere</button>
                <button class="btn prompt-action" data-action="Lengre" type="button">Lengre</button>
                <button class="btn prompt-action" data-action="Mer formell" type="button">Mer formell</button>
                <button class="btn prompt-action" data-action="Mer salgsrettet" type="button">Mer salgsrettet</button>
                <button class="btn prompt-action" data-action="Mer uformell" type="button">Mer uformell</button>
                <button id="regenerateBtn" class="btn" type="button">Lag ny versjon</button>
              </div>
            </div>

            <div class="grid-2">
              <button id="copyReplyBtn" class="btn" type="button">Kopier</button>
              <button id="refreshContextBtn" class="btn" type="button">Hent aktiv e-post</button>
            </div>

            <div class="footer-voice">
              <button id="voiceInputBtn" class="voice-left" type="button" aria-label="Trykk og snakk">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M12 4a3 3 0 0 1 3 3v5a3 3 0 1 1-6 0V7a3 3 0 0 1 3-3Z" stroke-width="1.8"/>
                  <path d="M19 11a7 7 0 0 1-14 0M12 18v3M9 21h6" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
              </button>

              <div id="voiceStatusText" class="voice-text">Trykk og snakk</div>

              <button id="speakReplyBtn" class="voice-right" type="button" aria-label="Les opp svar">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M5 9v6h4l5 4V5l-5 4H5Z" stroke-width="1.8" stroke-linejoin="round"/>
                  <path d="M18 9.5a4.5 4.5 0 0 1 0 5" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
              </button>
            </div>
          </section>

          <section class="panel" data-panel="summary">
            <div class="card">
              <h3 class="section-title">Oppsummer tråden</h3>
              <button id="generateSummaryBtn" class="btn primary full" type="button">
                Oppsummer
              </button>
            </div>

            <div class="card">
              <h3 class="section-title">Oppsummering</h3>
              <textarea
                id="summaryOutput"
                class="textarea summary-large"
                placeholder="Oppsummering vises her..."
              ></textarea>
            </div>

            <div class="grid-2">
              <button id="copySummaryBtn" class="btn" type="button">Kopier</button>
              <button id="clearAllBtn" class="btn" type="button">Tøm felter</button>
            </div>
          </section>

          <section class="panel" data-panel="tasks">
            <div class="card">
              <h3 class="section-title">Oppgaver og oppfølging</h3>
              <button id="generateTasksBtn" class="btn primary full" type="button">
                Foreslå oppgaver
              </button>
              <div class="helper-text">
                Viser opptil 3 forslag. Kalender-/to-do-/reminder-knapper er klargjort.
              </div>
            </div>

            <div id="taskCards" class="task-cards">
              <div class="task-card" data-task-card="0">
                <div class="task-card-top">
                  <div id="taskCardTitle0" class="task-card-title"></div>
                  <div class="task-card-meta">Forslag 1</div>
                </div>
                <div class="task-card-actions">
                  <button class="task-action-btn" data-task-action="calendar" data-task-index="0" type="button">Kalender</button>
                  <button class="task-action-btn" data-task-action="todo" data-task-index="0" type="button">To-do</button>
                  <button class="task-action-btn" data-task-action="reminder" data-task-index="0" type="button">Reminder</button>
                </div>
              </div>

              <div class="task-card" data-task-card="1">
                <div class="task-card-top">
                  <div id="taskCardTitle1" class="task-card-title"></div>
                  <div class="task-card-meta">Forslag 2</div>
                </div>
                <div class="task-card-actions">
                  <button class="task-action-btn" data-task-action="calendar" data-task-index="1" type="button">Kalender</button>
                  <button class="task-action-btn" data-task-action="todo" data-task-index="1" type="button">To-do</button>
                  <button class="task-action-btn" data-task-action="reminder" data-task-index="1" type="button">Reminder</button>
                </div>
              </div>

              <div class="task-card" data-task-card="2">
                <div class="task-card-top">
                  <div id="taskCardTitle2" class="task-card-title"></div>
                  <div class="task-card-meta">Forslag 3</div>
                </div>
                <div class="task-card-actions">
                  <button class="task-action-btn" data-task-action="calendar" data-task-index="2" type="button">Kalender</button>
                  <button class="task-action-btn" data-task-action="todo" data-task-index="2" type="button">To-do</button>
                  <button class="task-action-btn" data-task-action="reminder" data-task-index="2" type="button">Reminder</button>
                </div>
              </div>
            </div>

            <div class="card">
              <h3 class="section-title">Forslag</h3>
              <textarea
                id="tasksOutput"
                class="textarea summary-large"
                placeholder="Oppgaver og oppfølging vises her..."
              ></textarea>
            </div>

            <div class="grid-2">
              <button id="copyTasksBtn" class="btn" type="button">Kopier</button>
              <button id="clearTasksViewBtn" class="btn" type="button">Tøm visning</button>
            </div>
          </section>

          <section class="panel" data-panel="tools">
            <div class="card">
              <h3 class="section-title">Ny e-post / reklamasjon</h3>
              <textarea id="toolPrompt" class="textarea small" placeholder="Skriv kort hva du vil generere..."></textarea>
            </div>

            <div class="grid-2">
              <button id="generateNewEmailBtn" class="btn" type="button">Ny e-post</button>
              <button id="generateComplaintBtn" class="btn" type="button">Reklamasjon</button>
            </div>

            <div class="card">
              <h3 class="section-title">Smart handlinger</h3>
              <button id="suggestToolsBtn" class="btn full" type="button">Analyser</button>
            </div>

            <div class="card">
              <h3 class="section-title">Output</h3>
              <textarea id="toolsOutput" class="textarea small" placeholder="Resultat vises her..."></textarea>
            </div>

            <div class="grid-2">
              <button id="copyToolsBtn" class="btn" type="button">Kopier</button>
              <div></div>
            </div>
          </section>
        </div>
      </div>
    </div>

    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script src="/addin/taskpane.js"></script>
  </body>
</html>
